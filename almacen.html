<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Almacén Frine</title>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>FRINE</h1>
  <input id="loginUsuario" placeholder="Usuario" />
  <input id="loginPassword" type="password" placeholder="Password" />
  <button onclick="hacerLogin()">Ingresar</button>
  <div id="loginError"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h2>Bienvenido</h2>
  <div id="sidebarNombre"></div>
</div>

<script>
let usuarioActual = null;

async function hacerLogin() {
  const usuario = document.getElementById("loginUsuario").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const errorBox = document.getElementById("loginError");

  errorBox.textContent = "";

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ usuario, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorBox.textContent = data.error || "Error login";
      return;
    }

    usuarioActual = data;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("sidebarNombre").textContent = usuarioActual.nombre;

  } catch (err) {
    errorBox.textContent = "Error conexión";
  }
}
</script>

</body>
</html>
